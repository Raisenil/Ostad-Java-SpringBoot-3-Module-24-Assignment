spring.application.name=CV Evaluator

# Server configuration
server.port=8080

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# AI provider configuration
cv-evaluator.ai.provider=gemini
cv-evaluator.ai.gemini.model=gemini-2.5-flash
cv-evaluator.ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models
cv-evaluator.ai.gemini.api-key=your-gemini-api-key-here
cv-evaluator.ai.gemini.fallback-models=gemini-2.0-flash